{% extends "base.html" %}

{% block title %}Sair | Sistema de Gestão Comercial Agro{% endblock %}

{% block content %}
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
      <div class="card shadow-sm border-0">
        <div class="card-body p-4 text-center">
          <h1 class="h4 text-success mb-3">Deseja sair do sistema?</h1>
          <p class="text-muted">Sua sessão será encerrada com segurança.</p>
          <form method="post">
            {% csrf_token %}
            <div class="d-grid gap-2">
              <button type="submit" class="btn btn-success">Sim, sair</button>
              <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary">Voltar ao dashboard</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
